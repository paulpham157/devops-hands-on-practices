name: artifactory-build

on:
  push:
    branches:
      - main

jobs:
  build-publish-promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

      - name: Publish artifact with build info
        env:
          BUILD_NAME: sample-service
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          jf rt upload "dist/*" "generic-dev-local/sample-service/${BUILD_NUMBER}/" \
            --build-name="${BUILD_NAME}" \
            --build-number="${BUILD_NUMBER}"
          jf rt build-collect-env "${BUILD_NAME}" "${BUILD_NUMBER}"
          jf rt build-add-git "${BUILD_NAME}" "${BUILD_NUMBER}"
          jf rt build-publish "${BUILD_NAME}" "${BUILD_NUMBER}"

      - name: Promote after policy gate
        env:
          BUILD_NAME: sample-service
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          jf rt build-promote "${BUILD_NAME}" "${BUILD_NUMBER}" "generic-release-local" \
            --status="Released" \
            --copy=true

