syntax = "proto3";

package catalog;

service CatalogService {
  rpc GetProduct (ProductRequest) returns (ProductReply);
  rpc Health (HealthRequest) returns (HealthReply);
}

message ProductRequest {
  string id = 1;
}

message ProductReply {
  string id = 1;
  string name = 2;
  double price = 3;
  string protocol = 4;
}

message HealthRequest {}

message HealthReply {
  string status = 1;
}

