services:
  web:
    build:
      context: .
    environment:
      FASTAPI_HOST: 0.0.0.0
      FASTAPI_PORT: "5000"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "5001:5000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
