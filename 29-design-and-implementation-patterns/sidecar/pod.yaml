apiVersion: v1
kind: Pod
metadata:
  name: app-with-sidecar
spec:
  containers:
    - name: app
      image: nginx:1.27-alpine
      ports:
        - containerPort: 8080
          name: http
    - name: log-forwarder
      image: busybox:1.36
      command: ["sh", "-c", "tail -F /var/log/app.log"]
      volumeMounts:
        - name: app-logs
          mountPath: /var/log
  volumes:
    - name: app-logs
      emptyDir: {}

