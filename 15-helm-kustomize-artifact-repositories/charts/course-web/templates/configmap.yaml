apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "course-web.fullname" . }}-content
  labels:
    {{- include "course-web.labels" . | nindent 4 }}
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <title>{{ .Values.content.title }}</title>
      </head>
      <body>
        <h1>{{ .Values.content.title }}</h1>
        <p>{{ .Values.content.message }}</p>
      </body>
    </html>
