services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8088:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ../01-docker-compose-flask-redis
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: "5000"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker:
    image: redis:7.2-alpine
    command:
      - sh
      - -ec
      - |
        while true; do
          redis-cli -h redis --raw BLPOP order_queue 0 | {
            read -r queue || exit 0
            read -r order || exit 0
            redis-cli -h redis INCR completed_orders >/dev/null
            redis-cli -h redis LPUSH processed_order_ids "$${order}" >/dev/null
            echo "processed $${order}"
          }
        done
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9098:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      api:
        condition: service_healthy

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - order-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  order-data:
