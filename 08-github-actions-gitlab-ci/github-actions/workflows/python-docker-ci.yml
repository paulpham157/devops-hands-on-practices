name: Python Docker CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  APP_DIR: 08-github-actions-gitlab-ci/sample-app
  IMAGE_NAME: ci-platform-sample

jobs:
  test:
    name: Test Python app
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ env.APP_DIR }}/requirements-dev.txt

      - name: Install dependencies
        run: |
          cd "${APP_DIR}"
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          cd "${APP_DIR}"
          mkdir -p build
          python -m pytest -q --junitxml=build/test-results.xml
          python -m py_compile app.py

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: ${{ env.APP_DIR }}/build/test-results.xml

  docker:
    name: Build and smoke test image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image and load it into runner
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Smoke test image
        run: |
          docker rm -f ci-platform-sample >/dev/null 2>&1 || true
          docker run -d --name ci-platform-sample "${IMAGE_NAME}:${GITHUB_SHA}"

          for i in $(seq 1 20); do
            if docker exec ci-platform-sample python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz')" >/dev/null 2>&1; then
              echo "Smoke test passed"
              exit 0
            fi
            sleep 1
          done

          echo "Smoke test failed"
          docker logs ci-platform-sample
          exit 1

      - name: Clean up smoke test container
        if: always()
        run: docker rm -f ci-platform-sample >/dev/null 2>&1 || true
