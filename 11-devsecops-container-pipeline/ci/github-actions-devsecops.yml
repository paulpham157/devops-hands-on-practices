name: devsecops-container-pipeline

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  security-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 11-devsecops-container-pipeline

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run DevSecOps gate
        run: ./scripts/security-gate.sh

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-sbom
          path: 11-devsecops-container-pipeline/reports/devsecops-sbom.cdx.json
