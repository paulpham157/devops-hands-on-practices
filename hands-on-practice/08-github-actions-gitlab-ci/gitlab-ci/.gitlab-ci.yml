stages:
  - test
  - image
  - publish

variables:
  APP_DIR: hands-on-practice/08-github-actions-gitlab-ci/sample-app
  IMAGE_NAME: "$CI_REGISTRY_IMAGE/ci-platform-sample"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key:
    files:
      - hands-on-practice/08-github-actions-gitlab-ci/sample-app/requirements-dev.txt
  paths:
    - .cache/pip

test:
  stage: test
  image: python:3.12-slim
  script:
    - cd "$APP_DIR"
    - python -m pip install --upgrade pip
    - python -m pip install -r requirements-dev.txt
    - mkdir -p build
    - python -m pytest -q --junitxml=build/test-results.xml
    - python -m py_compile app.py
  artifacts:
    when: always
    reports:
      junit: hands-on-practice/08-github-actions-gitlab-ci/sample-app/build/test-results.xml
    paths:
      - hands-on-practice/08-github-actions-gitlab-ci/sample-app/build/test-results.xml
    expire_in: 1 week

build-image:
  stage: image
  image: docker:28.5-cli
  services:
    - name: docker:28.5-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - docker info
  script:
    - docker build -t "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" "$APP_DIR"
    - docker rm -f ci-platform-sample >/dev/null 2>&1 || true
    - docker run -d --name ci-platform-sample "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
    - |
      for i in $(seq 1 20); do
        if docker exec ci-platform-sample python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz')" >/dev/null 2>&1; then
          echo "Smoke test passed"
          exit 0
        fi
        sleep 1
      done
      echo "Smoke test failed"
      docker logs ci-platform-sample
      exit 1
  after_script:
    - docker rm -f ci-platform-sample >/dev/null 2>&1 || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

publish-image:
  stage: publish
  image: docker:28.5-cli
  services:
    - name: docker:28.5-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - docker info
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" -t "$IMAGE_NAME:latest" "$APP_DIR"
    - docker push "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
    - docker push "$IMAGE_NAME:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
