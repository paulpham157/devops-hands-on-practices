[docker_hosts]
docker-vm ansible_host=192.168.201.10

[docker_hosts:vars]
ansible_user=vagrant
ansible_ssh_private_key_file=../../lab-setup/.vagrant/machines/Docker/virtualbox/private_key
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
