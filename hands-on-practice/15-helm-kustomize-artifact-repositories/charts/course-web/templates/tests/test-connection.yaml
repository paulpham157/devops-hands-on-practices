apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "course-web.fullname" . }}-test-connection"
  labels:
    {{- include "course-web.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.37
      command: ["wget"]
      args: ["{{ include "course-web.fullname" . }}:{{ .Values.service.port }}"]
