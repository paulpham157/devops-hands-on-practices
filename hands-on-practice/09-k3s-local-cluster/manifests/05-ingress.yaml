apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k3s-demo
  namespace: docker-course-k3s
  labels:
    app.kubernetes.io/name: k3s-demo
    app.kubernetes.io/part-of: docker-course
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: k3s-demo
                port:
                  number: 80
